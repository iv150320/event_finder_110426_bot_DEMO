name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─── Job 1: Test ────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff — warnings only, non-blocking)
        run: ruff check . || true

      - name: Run tests
        run: pytest -q

  # ─── Job 2: Build + Smoke ───────────────────────────────────────────────
  build-and-smoke:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t event-finder-bot .

      - name: Run container with fake token
        run: |
          docker run -d \
            --name smoke-test \
            -e TELEGRAM_BOT_TOKEN=${{ secrets.CI_BOT_TOKEN }} \
            -e ALLOWED_USERS=123456 \
            -e ICS_PORT=8081 \
            -p 8081:8081 \
            event-finder-bot

      - name: Wait for startup
        run: sleep 10

      - name: Smoke test — /health endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost:8081/health || echo "FAILED")
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status": "ok"'

      - name: Smoke test — container running
        run: |
          STATE=$(docker inspect --format='{{.State.Running}}' smoke-test)
          echo "Container running: $STATE"
          [ "$STATE" = "true" ]

      - name: Container logs (debug)
        if: always()
        run: docker logs smoke-test 2>&1 | tail -30

      - name: Cleanup
        if: always()
        run: docker stop smoke-test && docker rm smoke-test

  # ─── Job 3: Deploy ──────────────────────────────────────────────────────
  deploy:
    needs: [test, build-and-smoke]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /root/event_finder_110426_bot
            git pull origin main
            docker compose up -d --build
            sleep 5
            docker compose ps
